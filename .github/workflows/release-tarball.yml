name: Release tarball

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate tag matches package version
        if: github.event_name == 'push'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_NAME" != "v$PACKAGE_VERSION" ]; then
            echo "Tag $TAG_NAME does not match package.json version v$PACKAGE_VERSION"
            exit 1
          fi

      - name: Build package
        run: npm run build

      - name: Pack tarball
        id: pack
        run: |
          npm pack --ignore-scripts --json > pack-result.json
          TARBALL=$(node -e "const fs = require('fs'); const pack = JSON.parse(fs.readFileSync('pack-result.json', 'utf8')); process.stdout.write(pack[0].filename);")
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          rm -f pack-result.json

      - name: Upload release asset
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.tarball }}
          generate_release_notes: true
          fail_on_unmatched_files: true
